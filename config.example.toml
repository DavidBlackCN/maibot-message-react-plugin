# MaiBot 消息贴表情插件 - 配置示例文件
# 复制此文件为 config.toml 并填写您的配置

# 插件基本信息
[plugin]

# 是否启用插件
enabled = true

# 配置版本（请勿手动修改）
config_version = "2.1.1"


# Napcat 服务连接配置
[napcat]

# Napcat 服务地址
# Docker 部署用户可使用 "napcat"
# 本地部署用户通常使用 "127.0.0.1"
host = "napcat"

# Napcat 服务端口
port = 9999

# Napcat 服务认证 Token
# 请填写您的 Napcat Token（在 Napcat WebUI → 网络配置中查看）
token = ""

# 选表情用的模型
# 支持两种写法：
#   1. MaiBot task 名：planner、tool_use 等
#   2. SDK 支持的模型标识：doubao-seed-1-6-25061 等
# 默认使用 planner 任务
llm_task = "planner"


# 普通聊天主动贴表情配置
[proactive]

# 是否在普通聊天中主动尝试贴表情
enabled = true

# 普通消息主动贴表情概率，范围 0.0-1.0
chance = 0.35

# 明显适合回应的消息主动贴表情概率，范围 0.0-1.0
keyword_chance = 0.75

# 同一聊天流主动贴表情冷却时间（秒）
cooldown_seconds = 180

# 触发主动贴表情的最短文本长度
min_text_length = 2

# 是否跳过机器人自己发送的消息
skip_self_messages = true
